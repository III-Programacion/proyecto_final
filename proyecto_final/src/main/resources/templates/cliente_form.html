<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Cliente</title>
</head>
<body>
<h2>Formulario Cliente</h2>
<form th:action="@{/admin/clientes}" th:object="${cliente}" method="post">
    <input type="hidden" th:field="*{id}">

    <label>Nombre:</label>
    <input type="text" th:field="*{nombre}" required><br>

    <label>Empresa:</label>
    <input type="text" th:field="*{empresa}" required><br>

    <button type="submit">Guardar</button>
</form>
</body>
</html>

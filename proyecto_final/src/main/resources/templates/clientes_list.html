<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Clientes</title>
</head>
<body>
<h2>Lista de Clientes</h2>
<a th:href="@{/admin/clientes/nuevo}">➕ Nuevo Cliente</a>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Empresa</th>
        <th>Acciones</th>
    </tr>
    <tr th:each="c : ${clientes}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.nombre}"></td>
        <td th:text="${c.empresa}"></td>
        <td>
            <a th:href="@{'/admin/clientes/editar/' + ${c.id}}">Editar</a> |
            <a th:href="@{'/admin/clientes/eliminar/' + ${c.id}}">Eliminar</a>
        </td>
    </tr>
</table>
</body>
</html>

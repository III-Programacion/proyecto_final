<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Formulario Empleado</title></head>
<body>
<h2>Formulario Empleado</h2>
<form th:action="@{/admin/empleados}" th:object="${empleado}" method="post">
    <input type="hidden" th:field="*{id}">
    <label>Nombre:</label>
    <input type="text" th:field="*{nombre}" required><br>
    <label>Email:</label>
    <input type="email" th:field="*{email}" required><br>
    <button type="submit">Guardar</button>
</form>
</body>
</html>

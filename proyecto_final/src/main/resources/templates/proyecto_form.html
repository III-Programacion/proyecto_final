<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Formulario Proyecto</title></head>
<body>
<h2>Formulario Proyecto</h2>
<form th:action="@{/admin/proyectos}" th:object="${proyecto}" method="post">
    <input type="hidden" th:field="*{id}">

    <label>Nombre:</label>
    <input type="text" th:field="*{nombre}" required><br>

    <label>Descripción:</label>
    <input type="text" th:field="*{descripcion}" required><br>

    <label>Cliente:</label>
    <select th:field="*{cliente.id}" required>
        <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nombre}"></option>
    </select><br>

    <label>Empleados:</label>
    <select th:field="*{empleados}" multiple>
        <option th:each="e : ${empleados}" th:value="${e.id}" th:text="${e.nombre}"></option>
    </select><br>

    <button type="submit">Guardar</button>
</form>
</body>
</html>

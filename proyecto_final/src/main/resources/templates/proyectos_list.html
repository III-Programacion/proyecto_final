<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Lista de Proyectos</title></head>
<body>
<h2>📋 Lista de Proyectos</h2>
<a th:href="@{/admin/proyectos/nuevo}">➕ Nuevo Proyecto</a>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Cliente</th>
        <th>Empleados</th>
        <th>Acciones</th>
    </tr>
    <tr th:each="p : ${proyectos}">
        <td th:text="${p.id}"></td>
        <td th:text="${p.nombre}"></td>
        <td th:text="${p.descripcion}"></td>
        <td th:text="${p.cliente != null ? p.cliente.nombre : 'Sin cliente'}"></td>
        <td>
            <span th:each="e : ${p.empleados}" th:text="${e.nombre} + ' '"></span>
        </td>
        <td>
            <a th:href="@{/admin/proyectos/editar/{id}(id=${p.id})}">✏️ Editar</a> |
            <a th:href="@{/admin/proyectos/eliminar/{id}(id=${p.id})}">🗑️ Eliminar</a>
        </td>
    </tr>
</table>
</body>
</html>

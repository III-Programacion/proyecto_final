<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reporte de Empleados</title>
</head>
<body>
<h2>👨‍💼 Reporte de Empleados</h2>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Email</th>
        <th>Perfil</th>
    </tr>
    <tr th:each="e : ${empleados}">
        <td th:text="${e.id}"></td>
        <td th:text="${e.nombre}"></td>
        <td th:text="${e.email}"></td>
        <td th:text="${e.perfil != null ? e.perfil.cargo : 'Sin perfil'}"></td>
    </tr>
</table>
</body>
</html>
